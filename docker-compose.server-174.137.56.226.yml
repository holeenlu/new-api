services:
  new-api:
    ports: !override
      - "127.0.0.1:3001:3000"
    environment:
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_TRUSTED_URL=${SESSION_COOKIE_TRUSTED_URL:-https://nextcode.buildtoconnect.com}

  caddy:
    image: caddy:2-alpine
    container_name: new-api-caddy
    restart: unless-stopped
    depends_on:
      - new-api
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.174.137.56.226:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - new-api-network

volumes:
  caddy_data:
  caddy_config:
