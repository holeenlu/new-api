# Frontend Development - Backend built from local source
#
# Usage:
#   1. docker compose -f docker-compose.dev.yml up -d
#   2. cd web && bun install && bun run dev
#   3. Open http://localhost:3001 (Rsbuild dev server, API auto-proxied to :3000)
#
# Rebuild backend after Go code changes:
#   docker compose -f docker-compose.dev.yml up -d --build new-api
#
# Stop:
#   docker compose -f docker-compose.dev.yml down
#
# Reset data:
#   docker compose -f docker-compose.dev.yml down -v

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: new-api-dev:local
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - dev_data:/data
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=UTC
      - CHANNEL_MANAGEMENT_REQUEST_TIMEOUT=${CHANNEL_MANAGEMENT_REQUEST_TIMEOUT:-30}
      - CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED=${CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED:-true}
      - BATCH_UPDATE_ENABLED=true
      - UPSTREAM_LOCATION_MODE=${UPSTREAM_LOCATION_MODE:-strip}
      - UPSTREAM_SYSTEM_PROXY_ENABLED=${UPSTREAM_SYSTEM_PROXY_ENABLED:-false}
      - UPSTREAM_LOCATION_DISCOVERY_ENABLED=${UPSTREAM_LOCATION_DISCOVERY_ENABLED:-true}
      - UPSTREAM_LOCATION_DISCOVERY_TIMEOUT=${UPSTREAM_LOCATION_DISCOVERY_TIMEOUT:-8}
      - UPSTREAM_HOST_PUBLIC_IP=${UPSTREAM_HOST_PUBLIC_IP:-}
      - UPSTREAM_HOST_LOCATION_COUNTRY=${UPSTREAM_HOST_LOCATION_COUNTRY:-}
      - UPSTREAM_HOST_LOCATION_REGION=${UPSTREAM_HOST_LOCATION_REGION:-}
      - UPSTREAM_HOST_LOCATION_CITY=${UPSTREAM_HOST_LOCATION_CITY:-}
      - UPSTREAM_HOST_LOCATION_TIMEZONE=${UPSTREAM_HOST_LOCATION_TIMEZONE:-}
      - UPSTREAM_HOST_LOCATION_LATITUDE=${UPSTREAM_HOST_LOCATION_LATITUDE:-}
      - UPSTREAM_HOST_LOCATION_LONGITUDE=${UPSTREAM_HOST_LOCATION_LONGITUDE:-}
      - UPSTREAM_EGRESS_PUBLIC_IP=${UPSTREAM_EGRESS_PUBLIC_IP:-}
      - UPSTREAM_EGRESS_LOCATION_COUNTRY=${UPSTREAM_EGRESS_LOCATION_COUNTRY:-}
      - UPSTREAM_EGRESS_LOCATION_REGION=${UPSTREAM_EGRESS_LOCATION_REGION:-}
      - UPSTREAM_EGRESS_LOCATION_CITY=${UPSTREAM_EGRESS_LOCATION_CITY:-}
      - UPSTREAM_EGRESS_LOCATION_TIMEZONE=${UPSTREAM_EGRESS_LOCATION_TIMEZONE:-}
      - UPSTREAM_EGRESS_LOCATION_LATITUDE=${UPSTREAM_EGRESS_LOCATION_LATITUDE:-}
      - UPSTREAM_EGRESS_LOCATION_LONGITUDE=${UPSTREAM_EGRESS_LOCATION_LONGITUDE:-}
      # Enable only when accessing the dev backend through HTTPS. SESSION_COOKIE_TRUSTED_URL is required when true.
      # - SESSION_COOKIE_SECURE=true
      # - SESSION_COOKIE_TRUSTED_URL=https://example.com,https://admin.example.com
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: new-api-dev-redis
    restart: unless-stopped
    networks:
      - dev-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-dev-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev_data:
  dev_pg_data:

networks:
  dev-network:
    driver: bridge
