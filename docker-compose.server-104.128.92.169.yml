services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api:oauth-local
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      SQL_DSN: "${SQL_DSN}"
      REDIS_CONN_STRING: "${REDIS_CONN_STRING}"
      SESSION_SECRET: "${SESSION_SECRET}"
      CRYPTO_SECRET: "${CRYPTO_SECRET}"
      TZ: "${TZ:-Asia/Shanghai}"
      BATCH_UPDATE_ENABLED: "true"
      GLOBAL_API_RATE_LIMIT_ENABLE: "${GLOBAL_API_RATE_LIMIT_ENABLE:-false}"
      GLOBAL_WEB_RATE_LIMIT_ENABLE: "${GLOBAL_WEB_RATE_LIMIT_ENABLE:-false}"
      CRITICAL_RATE_LIMIT_ENABLE: "${CRITICAL_RATE_LIMIT_ENABLE:-false}"
      SEARCH_RATE_LIMIT_ENABLE: "${SEARCH_RATE_LIMIT_ENABLE:-false}"
      CHANNEL_TEST_FREQUENCY: "${CHANNEL_TEST_FREQUENCY:-10}"
      CLAUDE_CODE_OAUTH_MAX_CONCURRENCY: "${CLAUDE_CODE_OAUTH_MAX_CONCURRENCY:-5}"
      CLAUDE_CODE_OAUTH_MIN_REQUEST_INTERVAL_MS: "${CLAUDE_CODE_OAUTH_MIN_REQUEST_INTERVAL_MS:-750}"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"

  caddy:
    image: caddy:2-alpine
    container_name: new-api-caddy
    restart: unless-stopped
    depends_on:
      - new-api
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.104.128.92.169:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - new-api-network

volumes:
  caddy_data:
  caddy_config:
