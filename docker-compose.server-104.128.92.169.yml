services:
  new-api:
    ports: !override
      - "127.0.0.1:3001:3000"

  caddy:
    image: caddy:2-alpine
    container_name: new-api-caddy
    restart: unless-stopped
    depends_on:
      - new-api
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.104.128.92.169:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - new-api-network

volumes:
  caddy_data:
  caddy_config:
