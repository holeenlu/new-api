services:
  new-api:
    image: new-api:oauth-local
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      SQL_DSN: "postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/new-api"
      REDIS_CONN_STRING: "redis://:${REDIS_PASSWORD}@redis:6379"
      SESSION_SECRET: "${SESSION_SECRET}"
      CLAUDE_CODE_OAUTH_MAX_CONCURRENCY: "${CLAUDE_CODE_OAUTH_MAX_CONCURRENCY:-5}"
      CLAUDE_CODE_OAUTH_MIN_REQUEST_INTERVAL_MS: "${CLAUDE_CODE_OAUTH_MIN_REQUEST_INTERVAL_MS:-750}"

  redis:
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  postgres:
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
