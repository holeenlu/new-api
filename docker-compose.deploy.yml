services:
  new-api:
    image: "${NEW_API_IMAGE:-new-api:oauth-local}"
    environment:
      SQL_DSN: "${SQL_DSN}"
      REDIS_CONN_STRING: "${REDIS_CONN_STRING}"
      SESSION_SECRET: "${SESSION_SECRET}"
      CRYPTO_SECRET: "${CRYPTO_SECRET}"
      TZ: "${TZ:-UTC}"
      MAX_REQUEST_BODY_MB: "${MAX_REQUEST_BODY_MB:-128}"
      BATCH_UPDATE_ENABLED: "${BATCH_UPDATE_ENABLED:-true}"
      GLOBAL_API_RATE_LIMIT_ENABLE: "${GLOBAL_API_RATE_LIMIT_ENABLE:-false}"
      GLOBAL_WEB_RATE_LIMIT_ENABLE: "${GLOBAL_WEB_RATE_LIMIT_ENABLE:-false}"
      CRITICAL_RATE_LIMIT_ENABLE: "${CRITICAL_RATE_LIMIT_ENABLE:-false}"
      SEARCH_RATE_LIMIT_ENABLE: "${SEARCH_RATE_LIMIT_ENABLE:-false}"
      CLAUDE_CODE_OAUTH_MAX_CONCURRENCY: "${CLAUDE_CODE_OAUTH_MAX_CONCURRENCY:-5}"
      CLAUDE_CODE_OAUTH_MIN_REQUEST_INTERVAL_MS: "${CLAUDE_CODE_OAUTH_MIN_REQUEST_INTERVAL_MS:-750}"
      CODEX_OAUTH_MAX_CONCURRENCY: "${CODEX_OAUTH_MAX_CONCURRENCY:-5}"
      CODEX_OAUTH_MIN_REQUEST_INTERVAL_MS: "${CODEX_OAUTH_MIN_REQUEST_INTERVAL_MS:-750}"
      SUBSCRIPTION_OAUTH_RESPONSE_HEADER_TIMEOUT: "${SUBSCRIPTION_OAUTH_RESPONSE_HEADER_TIMEOUT:-30}"
      CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED: "${CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED:-true}"
      CODEX_OAUTH_CLIENT_ID: "${CODEX_OAUTH_CLIENT_ID:-app_EMoamEEZ73f0CkXaXp7hrann}"
      CODEX_OAUTH_REDIRECT_URI: "${CODEX_OAUTH_REDIRECT_URI:-http://localhost:1455/auth/callback}"
      CODEX_OAUTH_SCOPE: "${CODEX_OAUTH_SCOPE:-openid profile email offline_access}"
      CODEX_MODEL_LIST: "${CODEX_MODEL_LIST:-}"
      UPSTREAM_LOCATION_MODE: "${UPSTREAM_LOCATION_MODE:-strip}"
      UPSTREAM_SYSTEM_PROXY_ENABLED: "${UPSTREAM_SYSTEM_PROXY_ENABLED:-false}"
      UPSTREAM_LOCATION_DISCOVERY_ENABLED: "${UPSTREAM_LOCATION_DISCOVERY_ENABLED:-true}"
      UPSTREAM_LOCATION_DISCOVERY_TIMEOUT: "${UPSTREAM_LOCATION_DISCOVERY_TIMEOUT:-8}"
      UPSTREAM_HOST_PUBLIC_IP: "${UPSTREAM_HOST_PUBLIC_IP:-}"
      UPSTREAM_HOST_LOCATION_COUNTRY: "${UPSTREAM_HOST_LOCATION_COUNTRY:-}"
      UPSTREAM_HOST_LOCATION_REGION: "${UPSTREAM_HOST_LOCATION_REGION:-}"
      UPSTREAM_HOST_LOCATION_CITY: "${UPSTREAM_HOST_LOCATION_CITY:-}"
      UPSTREAM_HOST_LOCATION_TIMEZONE: "${UPSTREAM_HOST_LOCATION_TIMEZONE:-}"
      UPSTREAM_HOST_LOCATION_LATITUDE: "${UPSTREAM_HOST_LOCATION_LATITUDE:-}"
      UPSTREAM_HOST_LOCATION_LONGITUDE: "${UPSTREAM_HOST_LOCATION_LONGITUDE:-}"
      UPSTREAM_EGRESS_PUBLIC_IP: "${UPSTREAM_EGRESS_PUBLIC_IP:-}"
      UPSTREAM_EGRESS_LOCATION_COUNTRY: "${UPSTREAM_EGRESS_LOCATION_COUNTRY:-}"
      UPSTREAM_EGRESS_LOCATION_REGION: "${UPSTREAM_EGRESS_LOCATION_REGION:-}"
      UPSTREAM_EGRESS_LOCATION_CITY: "${UPSTREAM_EGRESS_LOCATION_CITY:-}"
      UPSTREAM_EGRESS_LOCATION_TIMEZONE: "${UPSTREAM_EGRESS_LOCATION_TIMEZONE:-}"
      UPSTREAM_EGRESS_LOCATION_LATITUDE: "${UPSTREAM_EGRESS_LOCATION_LATITUDE:-}"
      UPSTREAM_EGRESS_LOCATION_LONGITUDE: "${UPSTREAM_EGRESS_LOCATION_LONGITUDE:-}"
      # Legacy aliases kept for existing deployments.
      RELAY_LOCATION_COUNTRY: "${RELAY_LOCATION_COUNTRY:-}"
      RELAY_LOCATION_REGION: "${RELAY_LOCATION_REGION:-}"
      RELAY_LOCATION_CITY: "${RELAY_LOCATION_CITY:-}"
      RELAY_LOCATION_TIMEZONE: "${RELAY_LOCATION_TIMEZONE:-}"
      RELAY_LOCATION_LATITUDE: "${RELAY_LOCATION_LATITUDE:-}"
      RELAY_LOCATION_LONGITUDE: "${RELAY_LOCATION_LONGITUDE:-}"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
